<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team 1 Buzzer</title>
    <link rel="stylesheet" href="css/host.css">
</head>

<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;">
    <div class="card" style="max-width:560px;width:100%;text-align:center;">
        <h2>Team 1 Device</h2>
        <p class="card-desc">Tap below to open the live buzzer/answer screen.</p>
        <button class="btn btn-primary btn-lg" id="openBtn">Open Team 1 Buzzer</button>
    </div>

    <script>
        const target = `buzzer.html?team=1&server=${window.location.host}`;
        document.getElementById('openBtn').onclick = () => window.location.href = target;
        window.location.replace(target);
    </script>
</body>

</html>
