<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team 3 Dashboard</title>
    <link rel="stylesheet" href="css/display.css">
</head>

<body>
    <h1>Team 3 Dashboard</h1>
    <div id="question-container"></div>
    <form id="option-form">
        <div id="options-container"></div>
        <button type="submit">Submit Answer</button>
    </form>
    <div id="result"></div>
    <script src="js/questions.js"></script>
    <script>
        // --- WebSocket Setup ---
        const teamIdx = 2; // Team 3
        const serverUrl = window.location.hostname + ':3000';
        const ws = new WebSocket(`ws://${serverUrl}`);

        ws.onopen = () => {
            ws.send(JSON.stringify({ type: 'REGISTER_BUZZER', teamIdx }));
        };

        // --- Question/Option Rendering ---
        const questionContainer = document.getElementById('question-container');
        const optionsContainer = document.getElementById('options-container');
        const resultDiv = document.getElementById('result');
        let currentQuestion = null;

        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            if (msg.type === 'R1_OPTIONS') {
                renderQuestion(msg.question, msg.options, msg.qLabel);
            } else if (msg.type === 'RESULT') {
                resultDiv.textContent = msg.correct ? 'Correct!' : 'Incorrect!';
            } else if (msg.type === 'QUESTION_OVER') {
                questionContainer.textContent = '';
                optionsContainer.innerHTML = '';
                resultDiv.textContent = '';
            }
        };

        function renderQuestion(question, options, qLabel) {
            currentQuestion = question;
            questionContainer.textContent = (qLabel ? qLabel + ': ' : '') + question.text;
            optionsContainer.innerHTML = '';
            options.forEach((opt, idx) => {
                const label = document.createElement('label');
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'option';
                radio.value = idx;
                label.appendChild(radio);
                label.appendChild(document.createTextNode(opt));
                optionsContainer.appendChild(label);
                optionsContainer.appendChild(document.createElement('br'));
            });
        }

        document.getElementById('option-form').onsubmit = function (e) {
            e.preventDefault();
            const selected = optionsContainer.querySelector('input[name="option"]:checked');
            if (!selected || !currentQuestion) return;
            ws.send(JSON.stringify({
                type: 'R1_ANSWER',
                teamIdx,
                selectedOption: parseInt(selected.value),
                timestamp: Date.now()
            }));
            resultDiv.textContent = 'Answer submitted!';
        };
    </script>
</body>

</html>
