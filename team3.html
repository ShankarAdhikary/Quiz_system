<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team 3 Buzzer</title>
    <link rel="stylesheet" href="css/host.css">
</head>

<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;">
    <div class="card" style="max-width:560px;width:100%;text-align:center;">
        <h2>Team 3 Device</h2>
        <p class="card-desc">If you are not redirected automatically, tap the button below.</p>
        <a class="btn btn-primary btn-lg" id="openBtn" href="#">Open Team 3 Buzzer</a>
    </div>

    <script>
        const target = `buzzer.html?team=3&server=${window.location.host}`;
        const openBtn = document.getElementById('openBtn');
        openBtn.setAttribute('href', target);
        window.location.replace(target);
    </script>
</body>

</html>
